			name = "Ensure Sena.xcframework headers (sim + device)";
			outputFileListPaths = (
			);
			outputPaths = (
			);
			runOnlyForDeploymentPostprocessing = 0;
			shellPath = /bin/sh;
			shellScript = "set -euo pipefail\nXC=\"${SRCROOT}/Vendor/Sena.xcframework\"\nif [ ! -d \"$XC\" ]; then\n  echo \"error: missing $XC (build/install Sena.xcframework first)\" >&2\n  exit 1\nfi\n\n# We only fix headers. If the slice directory or binary is missing, fail loudly.\nfor SLICE in ios-arm64 ios-arm64-simulator; do\n  if [ ! -d \"$XC/$SLICE\" ]; then\n    echo \"error: missing slice directory: $XC/$SLICE\" >&2\n    echo \"error: Sena.xcframework is incomplete. Rebuild it (must include simulator slice for sim builds).\" >&2\n    exit 1\n  fi\n  if [ ! -f \"$XC/$SLICE/libsena.a\" ]; then\n    echo \"error: missing $XC/$SLICE/libsena.a\" >&2\n    echo \"error: Sena.xcframework is incomplete. Rebuild it.\" >&2\n    exit 1\n  fi\n\n  if [ ! -d \"$XC/$SLICE/Headers\" ]; then\n    mkdir -p \"$XC/$SLICE/Headers\"\n\n    # Prefer copying from the device slice if it already has headers.\n    if [ -d \"$XC/ios-arm64/Headers\" ]; then\n      cp -f \"$XC/ios-arm64/Headers/\"* \"$XC/$SLICE/Headers/\" 2>/dev/null || true\n    fi\n\n    # Also drop in the project-level header as a fallback.\n    if [ -f \"${SRCROOT}/Headers/sena.h\" ]; then\n      cp -f \"${SRCROOT}/Headers/sena.h\" \"$XC/$SLICE/Headers/sena.h\"\n    fi\n  fi\ndone\n";
		};
