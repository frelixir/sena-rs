name: SenaLauncher
options:
  bundleIdPrefix: io.github.xmoezzz.sena
settings:
  base:
    MACOSX_DEPLOYMENT_TARGET: "11.0"
targets:
  SenaLauncher:
    type: application
    platform: macOS
    deploymentTarget: "11.0"
    sources:
      - path: SenaLauncher
    resources:
      - path: SenaLauncher/Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.github.xmoezzz.sena.macos
        PRODUCT_NAME: Sena
        SWIFT_VERSION: "5.0"
        INFOPLIST_FILE: SenaLauncher/Info.plist
        # Link-time search path for libsena.dylib copied into Vendor/
        LIBRARY_SEARCH_PATHS: ["$(PROJECT_DIR)/Vendor"]
        OTHER_LDFLAGS: ["-L$(PROJECT_DIR)/Vendor", "-lsena", "-Wl,-rpath,@executable_path/../Frameworks"]
        LD_RUNPATH_SEARCH_PATHS: ["@executable_path/../Frameworks"]
    dependencies:
      - sdk: AppKit.framework
      - sdk: SwiftUI.framework
      - sdk: Security.framework
      - sdk: Metal.framework
      - sdk: QuartzCore.framework
